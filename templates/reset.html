{% extends "base.html" %}
{% block title %}Set New Password — Granite State G&C Tracker{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto py-12">
    <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight mb-6">Set New Password</h1>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded px-4 py-3 mb-4">{{ error }}</div>
    {% endif %}

    <form method="post" class="space-y-4">
        <div>
            <label for="password" class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">New Password (8+ characters)</label>
            <input type="password" name="password" id="password" required minlength="8"
                   class="w-full px-3 py-2 text-sm border-2 border-slate-200 rounded-lg outline-none focus:border-blue-500">
        </div>
        <div>
            <label for="confirm" class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Confirm Password</label>
            <input type="password" name="confirm" id="confirm" required minlength="8"
                   class="w-full px-3 py-2 text-sm border-2 border-slate-200 rounded-lg outline-none focus:border-blue-500">
        </div>
        <button type="submit" class="w-full px-4 py-2.5 bg-blue-600 text-white font-semibold text-sm rounded-lg hover:bg-blue-700 transition-colors">Set Password</button>
    </form>
</div>
{% endblock %}
