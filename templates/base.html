<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NH Executive Council{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

    <header class="site-nav">
        <div class="wrap">
            <a href="/" class="site-logo">
                <div class="logo-icon">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M3 21h18M3 7l9-4 9 4M6 7v10M18 7v10M9 21V11h6v10"/>
                    </svg>
                </div>
                <div>
                    <div class="logo-text">Executive Council</div>
                    <div class="logo-sub">New Hampshire</div>
                </div>
            </a>
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <nav class="nav-links">
                <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Dashboard</a>
                <a href="/meetings" class="nav-link {% if request.endpoint in ('meetings', 'meeting_detail') %}active{% endif %}">Meetings</a>
                <a href="/councilors" class="nav-link {% if request.endpoint in ('councilors', 'councilor_detail') %}active{% endif %}">Councilors</a>
                <a href="/vendors" class="nav-link {% if request.endpoint == 'vendors' %}active{% endif %}">Vendors</a>
                <a href="/departments" class="nav-link {% if request.endpoint == 'departments' %}active{% endif %}">Departments</a>
                <a href="/contested" class="nav-link {% if request.endpoint == 'contested' %}active{% endif %}">Contested</a>
                <a href="/search" class="nav-link {% if request.endpoint == 'search' %}active{% endif %}">
                    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    Search
                </a>
            </nav>
        </div>
    </header>

    <main class="wrap page">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="wrap">
            <div>Data sourced from the <a href="https://www.sos.nh.gov">NH Secretary of State</a> &middot; 333 meetings &middot; 2012&ndash;2026</div>
            <div>33,000+ documents &middot; 180,000+ vote records</div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
